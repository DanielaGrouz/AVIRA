version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: avira_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: supersecretrootpassword
      MYSQL_DATABASE: avira_db
      MYSQL_USER: username
      MYSQL_PASSWORD: password
    volumes:
      - avira_db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  avira_db_data: